{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="{% static 'assets/img/logos/gs-favicon.svg' %}">
    <link rel="alternate icon" href="{% static 'assets/img/logos/gs-favicon.ico' %}">
    <link rel="mask-icon" href="{% static 'assets/img/logos/gs-favicon.ico' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'assets/img/logos/gs-favicon-180.png' %}">
    <style>
        body {
            background-color: #0B1727;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            position: relative;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 1.5rem;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: 20px;
        }
        .login-card h2 {
            color: #003087;
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
        }
        .login-card h4 {
            color: #003087;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .form-select, .form-control {
            border-radius: 0;
            border: 1px solid #ced4da;
        }
        .btn-primary {
            background-color: #0B1727;
            border-color: #0B1727;
            border-radius: 0;
            width: 100%;
        }
        .btn-primary:hover {
            background-color: #002766;
            border-color: #002766;
        }
        .form-check-label {
            color: #003087;
        }
        .text-muted a {
            color: #003087;
            text-decoration: none;
        }
        .text-muted a:hover {
            text-decoration: underline;
        }
        #loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="mb-3">Welcome to Goldman.com.</h2>
        <h4 class="mt-2 mb-2">Sign in to continue.</h4>
        <form id="loginForm" method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <input type="email" class="form-control" name="email" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary mb-3">Sign In</button>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember username</label>
            </div>
            <p class="text-muted">
                <a href="#" class="me-3">Forgot password?</a>
                <a href="#">Contact Technical Support</a>
            </p>
        </form>
    </div>
    <!-- Loader Spinner -->
    <div id="loader">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <!-- SweetAlert2 and Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Show loader
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            fetch(this.action, {
                method: 'POST',
                body: new FormData(this),
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                // Hide loader
                loader.style.display = 'none';

                if (data.status === 'success') {
                    Swal.fire({
                        title: 'Success!',
                        text: data.message,
                        icon: 'success',
                        confirmButtonText: 'OK'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = '/'; // Redirect to home page after login
                        }
                    });
                } else {
                    Swal.fire({
                        title: 'Error!',
                        text: data.message,
                        icon: 'error',
                        confirmButtonText: 'OK'
                    });
                }
            })
            .catch(error => {
                // Hide loader on error
                loader.style.display = 'none';
                Swal.fire({
                    title: 'Error!',
                    text: 'An unexpected error occurred. Please try again.',
                    icon: 'error',
                    confirmButtonText: 'OK'
                });
            });
        });
    </script>
</body>
</html>
